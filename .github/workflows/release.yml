name: Release (Linux + Windows)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Linux: dependências comuns para empacotar AppImage
      - name: Linux deps (AppImage)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      # Build
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux AppImage

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win nsis msi

      # Upload artifacts (para debug e também como fonte para o Release)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-Linux
          path: dist-linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-Windows
          path: dist-windows

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-linux/*
            dist-windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}